<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English UI Sample</title>
  <link rel="stylesheet" href="./ui-sample.css" />
</head>
<body class="sample-body english-body">
  <main class="phone english-phone">
    <header class="top-row">
      <div class="logo">EN</div>
      <div class="mode">BLUE · TOUGH</div>
    </header>

    <div class="kicker">TRAVEL ENGLISH / 300 PHRASES</div>

    <h1 class="title">Speak strong.<br />Move easy.</h1>

    <p class="subtitle">
      짧고 강하게 말하는 미국식 여행 영어 화면 샘플입니다.
      버튼은 크고, 색감은 묵직한 블루 계열로 잡았습니다.
    </p>

    <section class="main-card">
      <div class="card-label">오늘의 핵심 문장</div>
      <h2 class="phrase">Could you help me?</h2>
      <div class="meaning">도와주실 수 있나요?</div>
      <div class="sound-box">발음: 쿠드 유 헬프 미?</div>
    </section>

    <section class="buttons">
      <button class="primary">▶ 듣고 따라하기</button>
      <button class="secondary">↻ 3번 반복</button>
    </section>

    <section class="chips">
      <div class="chip">Airport</div>
      <div class="chip">Hotel</div>
      <div class="chip">Restaurant</div>
      <div class="chip">Emergency</div>
      <div class="chip">Shopping</div>
    </section>
  </main>

  <a class="back-link" href="./ui-sample.html">← 샘플 선택으로 돌아가기</a>
</body>
</html>
