<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>D안 일본어 노트형</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#f7efe8;color:#3f3430;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif;padding:18px}.app{max-width:430px;margin:0 auto;min-height:calc(100vh - 36px);background:#fffdf8;border-radius:22px;padding:26px;box-shadow:0 24px 70px rgba(91,64,48,.16);background-image:linear-gradient(#fffdf8 31px,#f0e4da 32px)}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px}.logo{font-size:28px;font-weight:500;color:#b06c7c}.date{font-size:13px;color:#9a8175}h1{font-size:34px;line-height:1.2;margin:0 0 18px;font-weight:620;letter-spacing:-.04em}.desc{line-height:1.7;color:#7a675f;margin:0 0 26px}.card{background:#fff;border:1px solid #ead9d0;border-radius:26px;padding:24px;box-shadow:0 14px 34px rgba(91,64,48,.08);margin-bottom:18px}.label{font-size:13px;color:#b06c7c;font-weight:800;margin-bottom:14px}.phrase{font-size:30px;line-height:1.35;font-weight:500;margin-bottom:12px}.meaning{color:#5f514c}.sound{margin-top:16px;background:#fff1f4;border-radius:18px;padding:14px;color:#9d5164;font-weight:750}.buttons{display:grid;gap:12px}button{border:0;border-radius:18px;min-height:58px;font-size:15px;font-weight:850}.primary{background:#c78393;color:white}.secondary{background:#f4e7df;color:#6b534a}.memo{margin-top:20px;border-left:4px solid #c78393;padding-left:14px;color:#7a675f;line-height:1.65}</style></head><body><main class="app"><header class="header"><div class="logo">旅ノート</div><div class="date">Kyoto · Today</div></header><h1>조용히 익히는<br>일본어 한 문장.</h1><p class="desc">일본 여행 다이어리처럼 부드럽게 읽고, 천천히 따라 말하는 노트형 UI.</p><section class="card"><div class="label">今日のメモ</div><div class="phrase">おすすめは何ですか。</div><div class="meaning">추천 메뉴는 무엇인가요?</div><div class="sound">오스스메와 난데스카</div></section><section class="buttons"><button class="primary">▶ 부드럽게 듣기</button><button class="secondary">오늘 문장 저장</button></section><div class="memo">카페, 식당, 작은 상점에서 쓰기 좋은 정중한 표현 중심.</div></main></body></html>
