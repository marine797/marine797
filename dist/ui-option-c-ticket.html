<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>C안 영어 공항 티켓형</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#e9eef5;color:#1d2939;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif;padding:18px}.app{max-width:430px;margin:0 auto}.passport{background:#12345b;color:white;border-radius:32px 32px 20px 20px;padding:26px;box-shadow:0 24px 70px rgba(18,52,91,.26)}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:38px}.stamp{border:2px solid rgba(255,255,255,.45);border-radius:18px;padding:12px 14px;font-weight:950;transform:rotate(-4deg)}.small{font-size:12px;color:#a9c9ef;font-weight:850;letter-spacing:.07em}h1{font-size:38px;line-height:1.05;margin:0;letter-spacing:-.05em}.ticket{margin-top:-10px;background:#fff;color:#1d2939;border-radius:28px;padding:24px;box-shadow:0 22px 60px rgba(16,24,40,.16);position:relative}.ticket:before,.ticket:after{content:"";position:absolute;top:48%;width:26px;height:26px;background:#e9eef5;border-radius:50%}.ticket:before{left:-13px}.ticket:after{right:-13px}.route{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.code{font-size:34px;font-weight:950;color:#12345b}.line{height:2px;background:#d0d5dd;flex:1;margin:0 12px}.label{font-size:12px;color:#667085;font-weight:850;margin-bottom:8px;letter-spacing:.06em}.phrase{font-size:28px;font-weight:950;line-height:1.18;margin-bottom:10px;letter-spacing:-.04em}.meaning{color:#475467;margin-bottom:18px}.sound{background:#eef6ff;border-radius:20px;padding:14px;color:#12345b;font-weight:850}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}button{border:0;border-radius:18px;min-height:60px;font-weight:950;font-size:15px}.primary{background:#12345b;color:#fff}.secondary{background:#e9eef5;color:#12345b}</style></head><body><main class="app"><section class="passport"><div class="top"><div class="small">BOARDING LANGUAGE</div><div class="stamp">USA</div></div><h1>Airport-ready<br>English.</h1></section><section class="ticket"><div class="route"><div class="code">ICN</div><div class="line"></div><div class="code">LAX</div></div><div class="label">BOARDING PHRASE</div><div class="phrase">Where is gate 12?</div><div class="meaning">12번 게이트가 어디인가요?</div><div class="sound">웨어 이즈 게이트 트웰브?</div><div class="buttons"><button class="primary">▶ 탑승 전 듣기</button><button class="secondary">카테고리</button></div></section></main></body></html>
