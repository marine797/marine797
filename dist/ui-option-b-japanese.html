<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>B안 일본어 사쿠라 카드형</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(160deg,#fff8fa,#ffdce8);color:#4b3039;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif;padding:18px}.app{max-width:430px;margin:0 auto;min-height:calc(100vh - 36px);border-radius:42px;background:rgba(255,255,255,.74);padding:24px;box-shadow:0 30px 80px rgba(180,76,110,.18);position:relative;overflow:hidden}.app:before{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,164,190,.34)}.inner{position:relative}.header{text-align:center;margin-bottom:30px}.logo{width:58px;height:58px;margin:0 auto 14px;border-radius:22px;background:linear-gradient(145deg,#fff,#ffc6d8);display:grid;place-items:center;color:#b65372;font-weight:900;font-size:22px;box-shadow:0 16px 34px rgba(180,76,110,.14)}.badge{display:inline-block;padding:9px 14px;border-radius:999px;background:#fff3f7;color:#a44762;font-weight:800;font-size:12px}h1{font-size:36px;line-height:1.15;text-align:center;margin:0 0 14px;font-weight:720;letter-spacing:-.04em}.desc{text-align:center;color:#7a5964;line-height:1.65;margin:0 0 26px}.panel{background:#fff;border:1px solid rgba(214,130,157,.18);border-radius:34px;padding:24px;margin-bottom:18px;box-shadow:0 18px 42px rgba(180,76,110,.1)}.label{font-size:13px;color:#b65372;font-weight:850;margin-bottom:16px}.phrase{font-size:32px;line-height:1.28;font-weight:650;margin-bottom:14px}.meaning{font-size:16px;color:#60414b}.sound{margin-top:18px;padding:14px;border-radius:22px;background:#fff3f7;color:#9a4661;font-weight:800}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}button{border:0;border-radius:999px;min-height:60px;font-weight:850;font-size:15px}.primary{background:#ef9eb8;color:#fff;box-shadow:0 16px 34px rgba(180,76,110,.18)}.secondary{background:#fff;color:#9a4661;border:1px solid rgba(214,130,157,.25)}.list{margin-top:20px;display:grid;gap:10px}.item{background:#fff;border-radius:24px;padding:16px;display:flex;justify-content:space-between;color:#684b55}.item b{color:#a44762}</style></head><body><main class="app"><div class="inner"><header class="header"><div class="logo">日</div><div class="badge">SAKURA SOFT</div></header><h1>やさしく<br>伝える旅。</h1><p class="desc">일본어는 부드럽고 조용하게. 사쿠라 핑크, 흰 카드, 섬세한 여백 중심.</p><section class="panel"><div class="label">今日の一文</div><div class="phrase">ゆっくり話してください。</div><div class="meaning">천천히 말씀해 주세요.</div><div class="sound">윳쿠리 하나시테 쿠다사이</div></section><section class="buttons"><button class="primary">▶ 듣기</button><button class="secondary">↻ 반복</button></section><section class="list"><div class="item"><b>基本表現</b><span>25문장</span></div><div class="item"><b>空港</b><span>30문장</span></div><div class="item"><b>カフェ</b><span>59문장</span></div></section></div></main></body></html>
