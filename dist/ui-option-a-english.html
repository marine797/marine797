<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>A안 영어 블루 대시보드형</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#06111f;color:#eef7ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif;padding:18px}.app{max-width:430px;margin:0 auto;min-height:calc(100vh - 36px);border-radius:34px;background:linear-gradient(160deg,#0a1d34,#143d6f 52%,#1f5b99);padding:24px;box-shadow:0 34px 100px rgba(0,0,0,.48);position:relative;overflow:hidden}.app:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 10%,rgba(142,197,255,.25),transparent 25%),linear-gradient(135deg,rgba(255,255,255,.08) 0 18%,transparent 18% 100%);pointer-events:none}.inner{position:relative}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:34px}.logo{width:56px;height:56px;border-radius:18px;background:#dcecff;color:#102a4d;display:grid;place-items:center;font-weight:950;box-shadow:0 16px 35px rgba(0,0,0,.28)}.badge{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.14);font-weight:850;font-size:12px;letter-spacing:.04em}h1{font-size:42px;line-height:1.02;margin:0 0 14px;letter-spacing:-.06em;font-weight:950}.desc{color:#c9ddf5;line-height:1.55;margin:0 0 28px}.panel{background:rgba(3,18,40,.44);border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:24px;margin-bottom:18px;box-shadow:0 20px 50px rgba(0,0,0,.22)}.label{font-size:13px;color:#8ec5ff;font-weight:900;margin-bottom:16px;letter-spacing:.05em}.phrase{font-size:34px;line-height:1.14;font-weight:950;margin-bottom:14px;letter-spacing:-.04em}.meaning{font-size:16px;color:#dcecff}.sound{margin-top:18px;padding:14px;border-radius:20px;background:rgba(255,255,255,.12);font-weight:850}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}button{border:0;border-radius:22px;min-height:62px;font-weight:950;font-size:15px}.primary{background:#8ec5ff;color:#0b2544;box-shadow:0 16px 34px rgba(0,0,0,.25)}.secondary{background:rgba(255,255,255,.12);color:#eef7ff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.card{border-radius:22px;background:rgba(255,255,255,.1);padding:16px;font-weight:850}.card span{display:block;font-size:12px;color:#c9ddf5;margin-top:8px;font-weight:500}</style></head><body><main class="app"><div class="inner"><header class="header"><div class="logo">EN</div><div class="badge">AMERICAN BLUE</div></header><h1>Speak<br>like you mean it.</h1><p class="desc">짧고 묵직하게 말하는 미국식 여행 영어. 강한 블루, 큰 버튼, 대시보드형 화면.</p><section class="panel"><div class="label">TODAY'S PHRASE</div><div class="phrase">Could you help me?</div><div class="meaning">도와주실 수 있나요?</div><div class="sound">쿠드 유 헬프 미?</div></section><section class="buttons"><button class="primary">▶ 듣기</button><button class="secondary">↻ 반복</button></section><section class="grid"><div class="card">Airport<span>입국 · 수하물</span></div><div class="card">Hotel<span>체크인 · 요청</span></div><div class="card">Food<span>주문 · 계산</span></div><div class="card">Help<span>긴급 · 문제</span></div></section></div></main></body></html>
