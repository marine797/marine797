<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese UI Sample</title>
  <link rel="stylesheet" href="./ui-sample.css" />
</head>
<body class="sample-body japanese-body">
  <main class="phone japanese-phone">
    <header class="top-row">
      <div class="logo">日</div>
      <div class="mode">PINK · SOFT</div>
    </header>

    <div class="kicker">旅の日本語 / 300 PHRASES</div>

    <h1 class="title">やさしく<br />伝える旅。</h1>

    <p class="subtitle">
      부드럽고 정중하게 말하는 일본어 여행 회화 화면 샘플입니다.
      전체 색감은 핑크 계열, 형태는 둥글고 섬세하게 잡았습니다.
    </p>

    <section class="main-card">
      <div class="card-label">今日の一文</div>
      <h2 class="phrase">ゆっくり話してください。</h2>
      <div class="meaning">천천히 말씀해 주세요.</div>
      <div class="sound-box">발음: 윳쿠리 하나시테 쿠다사이</div>
    </section>

    <section class="buttons">
      <button class="primary">▶ 듣고 따라하기</button>
      <button class="secondary">↻ 3번 반복</button>
    </section>

    <section class="chips">
      <div class="chip">基本表現</div>
      <div class="chip">空港</div>
      <div class="chip">カフェ</div>
      <div class="chip">観光</div>
      <div class="chip">買い物</div>
    </section>
  </main>

  <a class="back-link" href="./ui-sample.html">← 샘플 선택으로 돌아가기</a>
</body>
</html>
